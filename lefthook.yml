output:
- failure

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.{ts,tsx,js,mjs}"
      run: |
        deno fmt {staged_files}
        git diff --quiet -- {staged_files} || (
          echo "Commit blocked: deno fmt changed files."
          exit 1
        )
    lint:
      glob: "*.{ts,tsx,js,mjs}"
      run: deno lint {staged_files}
    check:
      glob: "*.{ts,tsx,js,mjs}"
      run: deno check {staged_files}

pre-push:
  commands:
    fmt:
      run: deno fmt --check
    lint:
      run: deno lint
    check:
      run: deno check src/**/*.ts
