name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, closed]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write # Required for OIDC authentication
  contents: read

jobs:
  prepare:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      neon_branch_name: ${{ steps.branch_name.outputs.name }}
    steps:
      - name: Build Neon PR branch name
        id: branch_name
        shell: bash
        run: |
          # lowercase, replace invalid chars with '-', trim repeated '-', cap length
          slug="$(echo "${{ github.head_ref }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' \
            | cut -c1-40)"
          echo "name=pr-app-${{ github.event.pull_request.number }}-${slug}" >> "$GITHUB_OUTPUT"

  check:
    if: github.event.action != 'closed'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Generate astro types
        run: vpx astro sync

      - name: Lint, format and typecheck
        run: vp check

  test:
    if: github.event.action != 'closed'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: "oidc"
          identity-id: "336ff1b2-cf61-4de3-b249-52da696d39b0"
          project-slug: "lunar-reminder-q-gd-a"
          env-slug: "dev"

      - name: Ensure Neon PR branch exists
        id: neon_create
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: ${{ needs.prepare.outputs.neon_branch_name }}
          parent_branch: production
          api_key: ${{ env.NEON_API_KEY }}

      - name: Reset Neon PR branch from parent
        id: neon_reset
        uses: neondatabase/reset-branch-action@v1
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: ${{ needs.prepare.outputs.neon_branch_name }}
          parent: true
          api_key: ${{ env.NEON_API_KEY }}

      - name: Run migrations
        env:
          DATABASE_URL: ${{ steps.neon_reset.outputs.db_url }}
        run: vpx drizzle-kit migrate

      - name: Run tests
        env:
          DATABASE_URL: ${{ steps.neon_reset.outputs.db_url }}
        run: vp test

  cleanup-neon-branch:
    if: github.event.action == 'closed'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: prepare

    steps:
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: "oidc"
          identity-id: "336ff1b2-cf61-4de3-b249-52da696d39b0"
          project-slug: "lunar-reminder-q-gd-a"
          env-slug: "dev"

      - name: Delete Neon PR branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: ${{ needs.prepare.outputs.neon_branch_name }}
          api_key: ${{ env.NEON_API_KEY }}
